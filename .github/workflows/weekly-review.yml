name: Validate review source data

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "data/**"
      - "package.json"
      - ".github/workflows/weekly-review.yml"
  pull_request:
    branches: [main]
    paths:
      - "config/**"
      - "data/**"
      - "package.json"
      - ".github/workflows/weekly-review.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-review-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate exported data only
        run: npm run validate

      - name: Confirm this workflow cannot overwrite PDFs
        run: |
          test -z "$(git status --porcelain -- generated)" || {
            echo "Validation unexpectedly changed generated files."
            git status --short -- generated
            exit 1
          }
