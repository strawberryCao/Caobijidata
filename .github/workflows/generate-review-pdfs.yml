name: Generate review PDFs

on:
  push:
    branches: [main]
    paths:
      - 'data/index.json'
      - 'data/assets/**'
      - 'scripts/generate_review_pdfs.py'
      - '.github/workflows/generate-review-pdfs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'data/index.json'
      - 'data/assets/**'
      - 'scripts/generate_review_pdfs.py'
      - '.github/workflows/generate-review-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: review-pdf-generation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deterministic dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'Pillow==10.4.0' 'reportlab==4.2.2' 'pypdf==4.3.1'

      - name: Pass 1 - validate confirmed source records
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('.')
          data = json.loads((root/'data/index.json').read_text(encoding='utf-8'))
          errors=[]
          selected=[]
          ids=set()
          paths=set()
          for n in data.get('notes',[]):
              if n.get('organizationStatus')!='confirmed' or n.get('kind') not in {'mistake','memory'}:
                  continue
              selected.append(n)
              note_id=str(n.get('id') or '').strip()
              rel=str(n.get('imagePath') or '').strip()
              if not note_id or note_id in ids:
                  errors.append(f'invalid or duplicate id: {note_id}')
                  continue
              ids.add(note_id)
              if not rel.startswith('data/assets/') or '..' in Path(rel).parts or rel in paths:
                  errors.append(f'{note_id}: invalid or duplicate imagePath')
                  continue
              paths.add(rel)
              p=root/rel
              if not p.exists():
                  errors.append(f'{note_id}: missing image {rel}')
                  continue
              expected=(n.get('imageSha256') or '').lower()
              actual=hashlib.sha256(p.read_bytes()).hexdigest()
              if not expected or expected!=actual:
                  errors.append(f'{note_id}: sha mismatch {rel}')
          if not selected:
              errors.append('no confirmed mistake or memory records')
          kinds={n.get('kind') for n in selected}
          if not {'mistake','memory'} <= kinds:
              errors.append('both confirmed mistake and memory records are required')
          if errors:
              raise SystemExit('\n'.join(errors))
          print(f'validated {len(selected)} confirmed records')
          PY

      - name: Pass 2 - generate compact study PDFs
        run: python scripts/generate_review_pdfs.py

      - name: Pass 3 - deterministic PDF structure audit
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          from pypdf import PdfReader

          root=Path('.')
          manifest=json.loads((root/'generated/manifest.json').read_text(encoding='utf-8'))
          assert manifest.get('schemaVersion')==3
          assert manifest.get('generationPolicy')=='confirmed-source-fields-plus-generic-study-actions'
          assert manifest.get('contentVersion')=='study-first-v3-no-standalone-toc'
          assert manifest.get('contentRules',{}).get('standaloneTableOfContents') is False
          expected={x['path']:x['sha256'] for x in manifest['files']}
          counts=manifest['counts']
          required=[
              ('generated/错题综合整理.pdf',counts['mistake'],counts['mistake']),
              ('generated/背诵综合整理.pdf',1,counts['memory']),
          ]
          for rel,min_pages,max_pages in required:
              p=root/rel
              assert p.exists() and p.stat().st_size>10_000, f'invalid or too small: {rel}'
              assert expected.get(rel)==hashlib.sha256(p.read_bytes()).hexdigest(), f'hash mismatch: {rel}'
              reader=PdfReader(str(p))
              assert min_pages <= len(reader.pages) <= max_pages, f'unexpected page count: {rel}'
              for i,page in enumerate(reader.pages):
                  assert float(page.mediabox.width)>0 and float(page.mediabox.height)>0, f'invalid page {i+1}: {rel}'
          print('deterministic PDF structure audit passed')
          PY

      - name: Upload generated PDFs for visual review
        uses: actions/upload-artifact@v4
        with:
          name: review-pdfs-${{ github.run_id }}
          path: |
            generated/错题综合整理.pdf
            generated/背诵综合整理.pdf
            generated/manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit verified PDFs to the source branch
        run: |
          if git diff --quiet -- generated; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/错题综合整理.pdf generated/背诵综合整理.pdf generated/manifest.json
          git commit -m 'chore: replace unusable review PDFs with verified v3'
          TARGET_BRANCH='${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}'
          git push origin HEAD:"${TARGET_BRANCH}"
